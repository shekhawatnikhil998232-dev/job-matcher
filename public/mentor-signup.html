<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Become a Mentor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-blob"></div>

<div class="page" style="display:flex; justify-content:center; align-items:center; min-height:100vh;">
  
  <div class="k-card brutal-reveal" style="max-width:500px; width:100%; border-radius:24px; padding:40px;">
      <h1 class="page-title" style="font-size:28px; margin-bottom:10px;">Become a Mentor</h1>
      <p style="color:var(--text-2); margin-bottom:30px;">Share your expertise. Drop your scheduling link below to instantly join the marketplace!</p>
      
      <form id="mentorForm" style="display:flex; flex-direction:column; gap:20px;">
          
          <div>
              <label style="font-weight:600; font-size:14px; margin-bottom:8px; display:block;">Full Name*</label>
              <input type="text" id="m-name" required placeholder="Jane Doe" style="width:100%; background:var(--surface-2); border:2px solid var(--border); padding:14px; border-radius:12px; color:var(--text); font-size:16px;">
          </div>

          <div>
              <label style="font-weight:600; font-size:14px; margin-bottom:8px; display:block;">Email Address*</label>
              <input type="email" id="m-email" required placeholder="jane@example.com" style="width:100%; background:var(--surface-2); border:2px solid var(--border); padding:14px; border-radius:12px; color:var(--text); font-size:16px;">
          </div>
          
          <div style="display:flex; gap:15px;">
              <div style="flex:1;">
                  <label style="font-weight:600; font-size:14px; margin-bottom:8px; display:block;">Job Title*</label>
                  <input type="text" id="m-role" required placeholder="Senior Engineer" style="width:100%; background:var(--surface-2); border:2px solid var(--border); padding:14px; border-radius:12px; color:var(--text); font-size:16px;">
              </div>
              <div style="flex:1;">
                  <label style="font-weight:600; font-size:14px; margin-bottom:8px; display:block;">Company*</label>
                  <input type="text" id="m-company" required placeholder="Stripe" style="width:100%; background:var(--surface-2); border:2px solid var(--border); padding:14px; border-radius:12px; color:var(--text); font-size:16px;">
              </div>
          </div>

          <div>
              <label style="font-weight:600; font-size:14px; margin-bottom:8px; display:block;">Scheduling URL*</label>
              <input type="url" id="m-link" required placeholder="https://calendly.com/your-name/15min" style="width:100%; background:var(--surface-2); border:2px solid var(--border); padding:14px; border-radius:12px; color:var(--text); font-size:16px;">
          </div>
          
          <div>
              <label style="font-weight:600; font-size:14px; margin-bottom:8px; display:block;">Tags (comma separated)</label>
              <input type="text" id="m-tags" placeholder="React, Mentorship, System Design" style="width:100%; background:var(--surface-2); border:2px solid var(--border); padding:14px; border-radius:12px; color:var(--text); font-size:16px;">
          </div>
          
          <button type="submit" class="btn btn-primary" style="padding:16px; font-size:16px; margin-top:10px;">Launch Profile!</button>
          <a href="mentors.html" style="text-align:center; color:var(--text-3); font-size:14px; margin-top:10px; text-decoration:underline;">Back to Marketplace</a>
      </form>
  </div>
</div>

<script>
document.getElementById('mentorForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.textContent = "Registering...";

    const payload = {
        name: document.getElementById('m-name').value,
        email: document.getElementById('m-email').value,
        role: document.getElementById('m-role').value,
        company: document.getElementById('m-company').value,
        scheduling_link: document.getElementById('m-link').value,
        tags: document.getElementById('m-tags').value || "Engineering"
    };

    try {
        const res = await fetch('/api/mentors/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        
        if(res.ok) {
            btn.style.background = "var(--green)";
            btn.textContent = "Profile Live! Redirecting...";
            setTimeout(() => { window.location.href = "mentors.html"; }, 1500);
        } else {
            alert("Failed to register.");
            btn.textContent = "Launch Profile!";
        }
    } catch(err) {
        alert("Network Error");
        btn.textContent = "Launch Profile!";
    }
});
</script>
<script src="animations.js"></script>
</body>
</html>
